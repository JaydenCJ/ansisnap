<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real ansisnap session (output copied verbatim
       from a local run on 2026-07-13). -->
  <rect width="1060" height="560" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">ansisnap — screens, not escape bytes</text>

  <g fill="#adbac7">
    <text x="24" y="66"><tspan fill="#6cb6ff">$</tspan> ansisnap record lint -- sh greet.sh   <tspan fill="#768390"># progress bars, colors, overdraws</tspan></text>
    <text x="24" y="92" fill="#768390">recorded lint -&gt; .ansisnap/lint.snap (exit 0, 80x24, 2 row(s) used, 2 styled span(s))</text>

    <text x="24" y="144"><tspan fill="#6cb6ff">$</tspan> head -7 .ansisnap/lint.snap   <tspan fill="#768390"># the *rendered screen*, reviewable in a PR</tspan></text>
    <text x="24" y="170" fill="#909dab">ansisnap snapshot v1</text>
    <text x="24" y="196" fill="#909dab">cmd: ["sh","greet.sh"]</text>
    <text x="24" y="222" fill="#909dab">term: 80x24</text>
    <text x="24" y="248" fill="#909dab">exit: 0</text>
    <text x="24" y="274" fill="#909dab">--- screen: 24 rows x 80 cols ---</text>
    <text x="24" y="300">|<tspan fill="#57ab5a" font-weight="bold">   PASS</tspan> src/lib.rs (14 checks)</text>
    <text x="24" y="326">|<tspan fill="#57ab5a" font-weight="bold">   PASS</tspan> src/cli.rs (9 checks)</text>

    <text x="24" y="378"><tspan fill="#6cb6ff">$</tspan> ansisnap check   <tspan fill="#768390"># after someone breaks a check</tspan></text>
    <text x="24" y="404" fill="#f47067">FAIL    lint</text>
    <text x="24" y="430" fill="#909dab">        row 0 text differs:</text>
    <text x="24" y="456" fill="#57ab5a">          expected |   PASS src/lib.rs (14 checks)</text>
    <text x="24" y="482" fill="#f47067">          actual   |   PASS src/lib.rs (13 checks)</text>
    <text x="24" y="508" fill="#e0b543">                                         ^</text>
    <text x="24" y="534" fill="#909dab">1 snapshot(s): 0 ok, 1 failed</text>
  </g>
</svg>
